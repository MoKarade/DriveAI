name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validation du scaffolding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JSON parseable
        run: |
          fail=0
          while IFS= read -r f; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "ok: $f"
            else
              echo "❌ JSON invalide: $f"; fail=1
            fi
          done < <(find . -path ./.git -prune -o -name '*.json' -print)
          exit $fail

      - name: Workflows YAML valides
        run: |
          fail=0
          for f in .github/workflows/*.yml; do
            if python3 -c "import yaml,sys; yaml.safe_load(open('$f'))" 2>/dev/null; then echo "ok: $f"; else echo "YAML invalide: $f"; fail=1; fi
          done
          exit $fail

      - name: Syntaxe des scripts shell
        run: |
          fail=0
          while IFS= read -r f; do
            if bash -n "$f"; then echo "ok: $f"; else echo "❌ Syntaxe: $f"; fail=1; fi
          done < <(find . -path ./.git -prune -o -name '*.sh' -print)
          exit $fail

      - name: Scan de secrets
        run: bash .github/scripts/secret-scan.sh .

      - name: Fichiers de référence présents
        run: bash .github/scripts/check-structure.sh .

      - name: Frontmatter des agents
        run: bash .github/scripts/check-agents.sh .

  test:
    name: Tests unitaires (logique pure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Syntaxe des .gs (un .gs cassé fige le déploiement clasp)"
        # `node --check` ignore l'extension .gs → on copie en .js. Ne vérifie QUE la syntaxe
        # (pas les globals Google), ce qui suffit à attraper un déploiement cassé avant le merge.
        run: |
          tmp=$(mktemp -d); fail=0
          for f in src/*.gs; do cp "$f" "$tmp/$(basename "$f" .gs).js"; done
          for j in "$tmp"/*.js; do node --check "$j" || { echo "❌ Syntaxe: $(basename "$j" .js).gs"; fail=1; }; done
          exit $fail

      - name: Filet de tests du moteur (node --test, zéro dépendance)
        # Charge les .gs Apps Script dans un bac à sable Node (mocks Google) et vérifie la
        # logique de décision : routage, nommage, dates, garde zone protégée §1, prédicats
        # de collecte, invariant vie privée (ADR-0006/0007). Aucun `npm install` (0 dépendance).
        run: node --test test/*.test.js
